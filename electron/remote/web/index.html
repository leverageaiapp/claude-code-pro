<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>claude-code-pro · Shared Terminal</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231a1a1a'/%3E%3Cpath d='M7 10l5 6-5 6' stroke='%233b82f6' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M14 10l5 6-5 6' stroke='%233b82f6' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M21 10l5 6-5 6' stroke='%233b82f6' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/lib/xterm.js" integrity="sha384-f/1U6Z9wM4D71a5eRXEZnyOTMOvjqxr2XLwh+Go1OvIl3L3tOcvUrzudnhbECwl4" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.11.0/lib/addon-fit.js" integrity="sha384-txoiwu4RR2GD3qySbaj+BbzibkLbSJRcfqGYMu6z1EqHil4A2dyBiBW5dlacG6OR" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-unicode11@0.9.0/lib/addon-unicode11.js" integrity="sha384-s7G1tpQVHxwemnFdH7ZEOPEAMxRSbFGsvrhaHpxYuMssFdike2DQuIBzg43+p5/3" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@6.0.0/css/xterm.css" integrity="sha384-n2n7twoohnW+d3myBKaUgl7DSiwidw6MkQy9oesGzkPpMjejKRR3XlnD+5yCdtBD" crossorigin="anonymous">
    <style>
        :root {
            --bg: #0a0a0a;
            --fg: #ededed;
            --accent: #3b82f6;
            --success: #22c55e;
            --error: #ef4444;
            --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            width: 100%;
            background: var(--bg);
            color: var(--fg);
            overflow: hidden;
            font-family: Menlo, Consolas, Monaco, "Courier New", monospace;
        }
        #terminal-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 8px;
        }
        #status-dot {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
            transition: background 0.2s ease;
            z-index: 1000;
        }
        #status-dot.connecting {
            background: var(--warning);
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
            animation: blink 1s infinite;
        }
        #status-dot.disconnected {
            background: var(--error);
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        #banner {
            position: fixed;
            top: 0;
            left: 0;
            right: 30px;
            padding: 4px 12px;
            font-size: 11px;
            color: #888;
            background: rgba(26, 26, 26, 0.9);
            text-align: center;
            pointer-events: none;
            z-index: 999;
            border-bottom: 1px solid #222;
        }
    </style>
</head>
<body>
    <div id="banner">claude-code-pro shared terminal · data passes through Cloudflare</div>
    <div id="terminal-container"></div>
    <div id="status-dot" class="connecting"></div>
    <script src="js/terminal.js"></script>
</body>
</html>
