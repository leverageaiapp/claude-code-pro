name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: native/tsnet-sidecar/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron
        # Rebuild all native deps (node-pty, bufferutil, utf-8-validate, …)
        # against Electron's Node ABI. -w only-pty leaves bufferutil at the
        # CI runner's ABI, which causes "h.mask is not a function" crashes
        # whenever the ws package sends a masked frame.
        run: npx electron-rebuild -f

      - name: Build
        run: npm run build

      - name: Package & publish — macOS
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package & publish — Linux
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package & publish — Windows
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
